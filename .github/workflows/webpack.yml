name: CI/CD - Publicar SAPZ

on:
  push:
    branches: [ "main" ]

# Permissões necessárias para o GitHub Actions publicar páginas
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar e Buildar
        run: |
          npm install
          npm run build

      - name: Enviar ficheiros para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Pasta onde o Vite/Webpack gera o site final

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
